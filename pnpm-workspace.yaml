packages:
  - '.'
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
  - unrs-resolver
allowedDeprecatedVersions:
  eslint: '>=8.0.0 <9.0.0'
supportedArchitectures:
  os:
    - linux
    - win32
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - msvcrt
allowBuilds:
  '@tailwindcss/oxide': set this to true or false
  esbuild: set this to true or false
  unrs-resolver: set this to true or false
